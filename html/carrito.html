<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Sierra Dorada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/navbar.css">
    <link rel="stylesheet" href="../src/css/footer.css">
    <link rel="stylesheet" href="../src/css/style-carrito.css">
</head>

<body>

    <main class="container carrito-page">

        <header class="catalogo-header">
            <h1>Mi Carrito</h1>
            <p>Revisa tus productos antes de finalizar la compra.</p>
        </header>

        <div class="row g-4">
            <div class="col-lg-8">
                <div id="contenedorCarrito"></div>
            </div>
            <div class="col-lg-4">
                <section class="carrito-total">
                    <h2>
                        Resumen del Pedido
                        <div class="carrito-linea-total">
                            <span>Total de la compra</span>
                        <span id="totalCarrito">  $0   </span>
                   </div>
                    </h2>
                    <div class="carrito-detalles">
                        <div class="carrito-linea">
                            <span>Subtotal</span>
                            <span id="subtotalCarrito">$0</span>
                        </div>
                        <div class="carrito-linea">
                            <span>Envío</span>
                            <span id="envioCarrito">$0</span>
                        </div>
                    </div>
                    <button class="btn btn-dorado">
                        Proceder al pago
                    </button>
                    <div class="beneficios">
                        <div class="beneficio-item">
                            <i class="bi bi-box-seam"></i>
                            <div>
                                <strong>Envíos a todo Colombia</strong>
                                <p>Recibe tu pedido en cualquier lugar</p>
                            </div>
                        </div>
                        <div class="beneficio-item">
                            <i class="bi bi-shield-check"></i>
                            <div>
                                <strong>Productos de calidad</strong>
                                <p>Nuestros cervezas son artesanales</p>
                            </div>
                        </div>
                        <div class="beneficio-item">
                            <i class="bi bi-lock-fill"></i>
                            <div>
                                <strong>Pago seguro</strong>
                                <p>Tus compras están protegidas</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../src/js/app.js"></script>
    <script type="module" src="../src/js/carrito.js"></script>

</body>

</html>
