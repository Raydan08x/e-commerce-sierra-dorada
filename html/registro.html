<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuario - Sierra Dorada</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/navbar.css">
    <link rel="stylesheet" href="../src/css/footer.css">
    <link rel="stylesheet" href="../src/css/admin.css">
</head>

<body class="login-body">

    <main class="login-container">
        <section class="login-card registro-card">
            <img src="../src/assets/icons/complementario-letrasdoradas.png" alt="Logo Sierra Dorada" class="login-logo">

            <h1>Crear <span>Cuenta</span></h1>
            <p>Completa los datos del usuario para guardarlo en localStorage.</p>

            <form id="formRegistro" novalidate>
                <div class="row">
                    <div class="col-12 col-md-6 mb-3">
                        <label for="nombreCompleto" class="form-label"><i class="bi bi-person-badge-fill"></i> Nombre completo</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="nombreCompleto" class="form-control" placeholder="Nombre completo" required>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 mb-3">
                        <label for="telefono" class="form-label"><i class="bi bi-telephone-fill"></i> Numero de telefono</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="tel" id="telefono" class="form-control" placeholder="Solo numeros" required>
                        </div>
                    </div>

                    <div class="col-12 mb-3">
                        <label for="email" class="form-label"><i class="bi bi-envelope-fill"></i> Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 mb-3">
                        <label for="password" class="form-label"><i class="bi bi-lock-fill"></i> Contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="Minimo 6 caracteres" required>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 mb-3">
                        <label for="confirmarPassword" class="form-label"><i class="bi bi-shield-lock-fill"></i> Confirmar contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                            <input type="password" id="confirmarPassword" class="form-control" placeholder="Repite la contrasena" required>
                        </div>
                    </div>
                </div>

                <div id="mensajesRegistro" class="alert d-none mt-3" role="alert"></div>

                <button type="submit" class="btn btn-dorado w-100">Crear cuenta</button>
                <a href="login.html" class="btn btn-outline-dorado btn-registro mt-3">Volver al login</a>
            </form>
        </section>
    </main>

    <script type="module" src="../src/js/app.js"></script>
    <script src="../src/js/registro.js"></script>
</body>

</html>
