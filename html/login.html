<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Sierra Dorada</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/navbar.css">
    <link rel="stylesheet" href="../src/css/footer.css">
    <link rel="stylesheet" href="../src/css/admin.css">
</head>

<body class="login-body">

    <main class="login-container">
        <section class="login-card">
            <img src="../src/assets/icons/complementario-letrasdoradas.png" alt="Logo Sierra Dorada" class="login-logo">

            <h1>Acceso <span>Administrador</span></h1>
            <p>Ingresa para administrar los productos del catálogo.</p>

            <form id="formLogin">
                <div class="mb-4">
                   <label for="usuario" class="form-label"><i class="bi bi-person-fill"></i> Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="usuario" class="form-control" placeholder="Ejemplo: admin" required>
                    </div>

                <div class="mb-4">
                    <label for="password" class="form-label"><i class="bi bi-lock-fill"></i> Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Ejemplo: admin123" required>
                        <span class="input-group-text" style="cursor: pointer;" ><i class="bi bi-eye" id="togglePassword"></i></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-dorado w-100">Ingresar</button>

                <p id="mensajeLogin" class="mensaje-error mt-3"></p>
            </form>

            <div class="login-info">
                <strong>Usuario de prueba:</strong> admin <br>
                <strong>Contraseña:</strong> admin123
            </div>
        </section>
    </main>

    <script type="module" src="../src/js/app.js"></script>
    <script src="../src/js/login.js"></script>
</body>

</html>
