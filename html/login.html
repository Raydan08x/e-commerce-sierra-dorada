<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion - Sierra Dorada</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/navbar.css?v=20260715-4">
    <link rel="stylesheet" href="../src/css/footer.css?v=20260715-1">
    <link rel="stylesheet" href="../src/css/particles.css?v=20260715-3">
    <link rel="stylesheet" href="../src/css/components/Preloader.css">
    <link rel="stylesheet" href="../src/css/admin.css?v=20260715-1">
    <link rel="stylesheet" href="../src/css/typography.css?v=20260715-1">
</head>

<body class="login-body">

    <main class="login-container">
        <section class="login-card">
            <img src="../src/assets/icons/complementario-letrasdoradas.png" alt="Logo Sierra Dorada" class="login-logo">

            <h1>Iniciar <span>Sesion</span></h1>
            <p>Ingresa con tu usuario o registrate para crear una cuenta.</p>

            <form id="formLogin" novalidate>
                <div class="mb-4">
                    <label for="usuario" class="form-label"><i class="bi bi-person-fill"></i> Usuario o email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="usuario" class="form-control" placeholder="Ejemplo: user" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label"><i class="bi bi-lock-fill"></i> Contrasena</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Ejemplo: user123" required>
                        <button type="button" class="input-group-text password-toggle" id="togglePassword" aria-label="Mostrar contrasena">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="mensajeLogin" class="alert d-none mt-3" role="alert"></div>

                <button type="submit" class="btn btn-dorado btn-login-ingresar w-100">Ingresar</button>
                <a href="registro.html" class="btn btn-outline-dorado btn-registro mt-3">Registrarse</a>
            </form>

            <div class="login-info">
                <strong>Usuario:</strong> user <br>
                <strong>Email:</strong> user@sierradorada.com <br>
                <strong>Contrasena:</strong> user123 <br>
                <hr class="border-secondary">
                <strong>Admin:</strong> admin <br>
                <strong>Email:</strong> admin@sierradorada.com <br>
                <strong>Contrasena:</strong> admin123
            </div>
        </section>
    </main>

    <script type="module" src="../src/js/app.js?v=20260715-10"></script>
    <script src="../src/js/login.js?v=20260715-2"></script>
</body>

</html>
