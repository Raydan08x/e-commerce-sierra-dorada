<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Sierra Dorada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/navbar.css">
    <link rel="stylesheet" href="../src/css/footer.css">
    <link rel="stylesheet" href="../src/css/admin.css">
</head>

<body class="login-body">

    <main class="login-container">
        <section class="login-card">
            <img src="../src/assets/icons/isotipo-dorado-y-blanco.png" alt="Logo Sierra Dorada" class="login-logo">

            <h1>Acceso Administrador</h1>
            <p>Ingresa para administrar los productos del catálogo.</p>

            <form id="formLogin">
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario</label>
                    <input type="text" id="usuario" class="form-control" placeholder="Ejemplo: admin" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Ejemplo: admin123" required>
                </div>

                <button type="submit" class="btn btn-dorado w-100">Ingresar</button>

                <p id="mensajeLogin" class="mensaje-error mt-3"></p>
            </form>

            <div class="login-info">
                <strong>Usuario de prueba:</strong> admin <br>
                <strong>Contraseña:</strong> admin123
            </div>
        </section>
    </main>

    <script type="module" src="../src/js/app.js"></script>
    <script src="../src/js/login.js"></script>
</body>

</html>
