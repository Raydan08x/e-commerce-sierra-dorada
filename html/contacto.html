<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos - Sierra Dorada</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../src/css/styles-contacto.css">
    <link rel="stylesheet" href="../src/css/navbar.css">
    <link rel="stylesheet" href="../src/css/footer.css">
    <link rel="stylesheet" href="../src/css/components/Preloader.css">
</head>

<body>

    <main class="contacto-main">

        <section class="contacto-layout">

            <div class="contacto-card">
                <h2 class="contacto-titulo">CONTÁCTANOS</h2>

                <form id="form-contacto" novalidate>

                    <div class="input-group-custom">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ingresa tu nombre">
                    </div>

                    <div class="input-group-custom">
                        <label for="telefono">Número Telefónico</label>
                        <input type="tel" id="telefono" inputmode="numeric" pattern="[0-9]*" autocomplete="tel" placeholder="Ej: 3138718154">
                    </div>

                    <div class="input-group-custom">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="nombre@correo.com">
                    </div>

                    <div class="input-group-custom">
                        <label for="mensaje">Mensaje o Comentarios</label>
                        <textarea id="mensaje" rows="4" placeholder="¿En qué te podemos ayudar?"></textarea>
                    </div>

                    <button type="submit" class="btn-contacto-enviar">
                        ENVIAR MENSAJE
                    </button>

                </form>
            </div>

            <div class="contacto-info-card">
                <h2 class="info-titulo">INFORMACIÓN</h2>

                <div class="info-item">
                    <h3><i class="bi bi-telephone"></i> Teléfono</h3>
                    <a href="tel:+573138718154">+57 313 871 8154</a>
                </div>

                <div class="info-item">
                    <h3><i class="bi bi-envelope"></i> Correo Electrónico</h3>
                    <a href="mailto:contacto@sierradorada.co">
                        contacto@sierradorada.co
                    </a>
                </div>

                <div class="info-item">
                    <h3><i class="bi bi-geo-alt"></i> Ubicación</h3>
                    <a href="https://www.google.com/maps/search/?api=1&query=5.0361865663151395,-73.99458376574964"
                        target="_blank" rel="noopener noreferrer">
                        Calle 26 #12-63 Local 112<br>
                        CC Paseo de Gracia, Prados del Mirador<br>
                        Zipaquirá, Cundinamarca
                    </a>
                </div>

                <div class="info-item">
                    <h3><i class="bi bi-clock"></i> Horario</h3>
                    <p>
                        Lunes a Viernes: 9:00 AM - 6:00 PM<br>
                        Sábados: 10:00 AM - 3:00 PM
                    </p>
                </div>

                <div class="mapa-contacto">
                    <iframe
                        src="https://maps.google.com/maps?q=5.0361865663151395,-73.99458376574964&z=16&output=embed"
                        width="100%" height="100%" style="border:0;" loading="lazy" allowfullscreen>
                    </iframe>
                </div>
            </div>

        </section>

    </main>

    <script type="module" src="../src/js/app.js"></script>
    <script src="../src/js/contacto.js"></script>

</body>

</html>
