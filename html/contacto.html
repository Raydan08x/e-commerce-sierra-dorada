<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos - Sierra Dorada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../src/css/styles-contacto.css">
</head>

<body>
    <main class="contacto-main">
        <div class="contacto-card">
            <h2 class="contacto-titulo">CONTÁCTANOS</h2>

            <form id="form-contacto" novalidate>
                <div class="input-group-custom">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ingresa tu nombre">
                </div>

                <div class="input-group-custom">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="nombre@correo.com">
                </div>

                <div class="input-group-custom">
                    <label for="mensaje">Mensaje o Comentarios</label>
                    <textarea id="mensaje" rows="4" placeholder="¿En qué te podemos ayudar?"></textarea>
                </div>

                <button type="submit" class="btn-contacto-enviar">
                    ENVIAR MENSAJE
                </button>
            </form>
        </div>
    </main>

    <script type="module" src="../src/js/app.js"></script>
    <script src="../src/js/contacto.js"></script>

</body>

</html>
