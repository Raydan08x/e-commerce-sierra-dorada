<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - Sierra Dorada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600;700&family=Dorsa&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/navbar.css">
    <link rel="stylesheet" href="../src/css/footer.css">
    <link rel="stylesheet" href="../src/css/components/Preloader.css">
    <link rel="stylesheet" href="../src/css/admin.css">
    <link rel="stylesheet" href="../src/css/components/ProductDetailsModal.css">
</head>

<body>
    <main class="container catalogo-page">
        <header class="catalogo-header">
            <h1>Nuestro Catálogo</h1>
            <p>Descubre los sabores únicos de Sierra Dorada.</p>
        </header>

        <!-- Filtros de Catálogo Premium -->
        <div class="row mb-5 justify-content-center">
            <div class="col-12 col-md-10 text-center">
                <!-- Filtro de Categoría -->
                <div class="d-flex flex-wrap justify-content-center gap-2 mb-3">
                    <button type="button" class="btn btn-outline-dorado filter-category active" data-category="todos">Todos</button>
                    <button type="button" class="btn btn-outline-dorado filter-category" data-category="Cervezas">Cervezas</button>
                    <button type="button" class="btn btn-outline-dorado filter-category" data-category="Packs">Packs</button>
                    <button type="button" class="btn btn-outline-dorado filter-category" data-category="Merchandising">Merchandising</button>
                </div>

                <!-- Filtro de Estilo de Cerveza (se muestra cuando se filtra por Cervezas) -->
                <div id="seccionFiltroEstilo" class="p-3 rounded" style="background: rgba(179, 162, 105, 0.08); border: 1px solid rgba(179, 162, 105, 0.2); display: none;">
                    <span class="me-3 text-dorado" style="font-family: var(--fuente-destacados); font-size: 1.1rem; letter-spacing: 1px;">Filtrar Estilo:</span>
                    <div class="d-inline-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-sm btn-outline-light filter-style active" data-style="todos">Todos los estilos</button>
                        <button type="button" class="btn btn-sm btn-outline-light filter-style" data-style="sour">Sour</button>
                        <button type="button" class="btn btn-sm btn-outline-light filter-style" data-style="ale">Ale</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="catalogoProductos">
            <!-- Los productos agrupados se cargarán aquí -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../src/js/app.js"></script>
    <script type="module" src="../src/js/productos.js"></script>
</body>
</html>
